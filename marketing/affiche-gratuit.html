<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Zokko — Affiche gratuite</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { background: #111; display: flex; justify-content: center; padding: 24px; font-family: system-ui, Segoe UI, sans-serif; }
    .poster {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      background: linear-gradient(145deg, #009460 0%, #009460 33%, #FCD116 33%, #FCD116 66%, #CE1126 66%, #CE1126 100%);
    }
    .inner {
      position: absolute; inset: 28px; border-radius: 32px;
      background: #FAF8F5; display: flex; flex-direction: column; justify-content: center;
      align-items: center; text-align: center; padding: 56px;
    }
    .logo { font-size: 88px; font-weight: 800; color: #1A2E22; letter-spacing: -2px; }
    .logo span { color: #D84315; }
    .flag { font-size: 40px; margin: 12px 0 24px; }
    .title { font-size: 52px; font-weight: 800; color: #1A2E22; line-height: 1.15; max-width: 900px; }
    .free {
      margin: 32px 0; padding: 20px 48px; background: #D84315; color: #fff;
      font-size: 56px; font-weight: 800; border-radius: 20px; transform: rotate(-2deg);
    }
    .bullets { font-size: 34px; color: #3d4f45; line-height: 1.6; margin: 24px 0; text-align: left; max-width: 820px; }
    .bullets li { margin: 12px 0; }
    .url { font-size: 42px; font-weight: 700; color: #009460; margin-top: 28px; }
    .hint { font-size: 22px; color: #888; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="poster">
    <div class="inner">
      <div class="logo">Zok<span>ko</span></div>
      <div class="flag">🇬🇳 100% Guinée</div>
      <p class="title">Achetez &amp; vendez près de chez vous</p>
      <div class="free">ANNONCES GRATUITES</div>
      <ul class="bullets">
        <li>📱 Numéro +224 + code à 6 chiffres</li>
        <li>📷 Photos + prix en GNF</li>
        <li>💬 Contact WhatsApp direct</li>
      </ul>
      <p class="url">www.zokko.net</p>
      <p class="hint">Ouvrir ce fichier → capture d’écran → publier sur Facebook</p>
    </div>
  </div>
</body>
</html>
