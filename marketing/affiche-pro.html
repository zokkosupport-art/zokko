<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Zokko — Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { background: #111; display: flex; justify-content: center; padding: 24px; font-family: system-ui, Segoe UI, sans-serif; }
    .poster {
      width: 1080px; height: 1080px;
      background: linear-gradient(160deg, #1A2E22 0%, #2d4a38 100%);
      color: #fff; padding: 56px; display: flex; flex-direction: column;
    }
    .logo { font-size: 68px; font-weight: 800; }
    .logo span { color: #FF6600; }
    .pro {
      display: inline-block; margin: 20px 0 32px; background: #FCD116; color: #1A2E22;
      font-size: 26px; font-weight: 800; padding: 12px 24px; border-radius: 8px;
    }
    h1 { font-size: 54px; font-weight: 800; line-height: 1.12; margin-bottom: 36px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; flex: 1; font-size: 30px; }
    .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; border: 1px solid rgba(255,255,255,0.12); }
    .card strong { color: #FF6600; display: block; margin-bottom: 8px; font-size: 32px; }
    .footer {
      margin-top: 32px; text-align: center; padding-top: 28px; border-top: 2px solid #009460;
    }
    .url { font-size: 44px; font-weight: 800; color: #009460; }
    .sub { font-size: 24px; color: #aaa; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="poster">
    <div class="logo">Zok<span>ko</span></div>
    <span class="pro">COMPTE ENTREPRISE</span>
    <h1>Votre boutique visible dans toute la Guinée</h1>
    <div class="grid">
      <div class="card"><strong>Gratuit</strong>pour publier vos annonces</div>
      <div class="card"><strong>Stats</strong>vues &amp; clics WhatsApp</div>
      <div class="card"><strong>Quartiers</strong>Conakry &amp; villes GN</div>
      <div class="card"><strong>Boost</strong>option Orange Money</div>
    </div>
    <div class="footer">
      <p class="url">www.zokko.net</p>
      <p class="sub">Inscription → choisir « Entreprise » · support@zokko.net</p>
    </div>
  </div>
</body>
</html>
