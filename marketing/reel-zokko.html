<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Zokko — Reel 15s (enregistrer l'écran)</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      background: #000; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: system-ui, Segoe UI, sans-serif;
    }
    .phone {
      width: 405px; height: 720px; position: relative; overflow: hidden;
      border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
      background: linear-gradient(160deg, #009460 0%, #FCD116 45%, #CE1126 100%);
    }
    .slide {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 40px 28px; opacity: 0; animation: show 15s infinite;
      color: #1A2E22;
    }
    .slide:nth-child(1) { animation-delay: 0s; }
    .slide:nth-child(2) { animation-delay: 5s; }
    .slide:nth-child(3) { animation-delay: 10s; }
    @keyframes show {
      0%, 26% { opacity: 1; transform: scale(1); }
      33%, 100% { opacity: 0; transform: scale(1.05); }
    }
    .logo-wrap {
      width: 140px; height: 140px; background: #fff; border-radius: 32px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.2); margin-bottom: 28px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    .logo-wrap img { width: 110px; height: 110px; object-fit: contain; }
    .guinea-logo { filter: none; }
    h1 { font-size: 36px; font-weight: 800; line-height: 1.15; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.25); }
    h1 em { font-style: normal; color: #1A2E22; background: #fff; padding: 4px 12px; border-radius: 8px; }
    p { font-size: 22px; margin-top: 16px; color: #fff; font-weight: 600; text-shadow: 0 1px 8px rgba(0,0,0,.3); }
    .big { font-size: 48px; font-weight: 900; color: #fff; }
    .url { font-size: 26px; font-weight: 800; background: #1A2E22; color: #FCD116; padding: 12px 24px; border-radius: 12px; margin-top: 24px; }
    .hint {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      color: #aaa; font-size: 14px; max-width: 90%; text-align: center;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="slide">
      <div class="logo-wrap"><img src="../frontend/public/branding/icon-guinea.svg" alt="Zokko" onerror="this.src='../frontend/public/branding/icon-192.png'" /></div>
      <h1><em>Zokko</em><br />🇬🇳 Guinée</h1>
      <p>La marketplace près de chez vous</p>
    </div>
    <div class="slide">
      <p class="big">GRATUIT</p>
      <h1>Publiez votre annonce</h1>
      <p>📱 +224 · Photos · WhatsApp</p>
    </div>
    <div class="slide">
      <div class="logo-wrap"><img src="../frontend/public/branding/icon-192.png" alt="Zokko" style="filter: hue-rotate(-20deg) saturate(1.2);" /></div>
      <h1>Commencez maintenant</h1>
      <div class="url">www.zokko.net</div>
    </div>
  </div>
  <p class="hint">▶ Enregistrez l'écran 15 s (Story/Reel) · F11 plein écran optionnel</p>
</body>
</html>
