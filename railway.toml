# Railway config (repo root). Docker CMD in Dockerfile runs backend/start.sh.
# If healthcheck still fails: Railway UI → Service → Settings → Health Check
#   Path = /health  (not /api). Dashboard settings override railway.toml when set.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
